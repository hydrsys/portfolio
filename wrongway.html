<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ACCESS DENIED</title>
    <link rel="icon" type="image/png" href="storage/favicon.jpg">
    <style>
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 40px; 
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .glitch-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .status-code {
            font-weight: 900;
            font-size: 1.5rem;
            position: relative;
            color: #ffffff;
            display: inline-block;
        }

        .status-code::before, .status-code::after {
            content: "ERROR_CODE: WRONG_WAY"; 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black;
        }

        .status-code::before {
            left: 2px;
            text-shadow: -1px 0 #CF7AFF;
            clip: rect(10px, 9999px, 20px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        .status-code::after {
            left: -2px;
            text-shadow: 1px 0 #ffffff;
            clip: rect(25px, 9999px, 35px, 0);
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(5px, 9999px, 15px, 0); transform: skew(0.2deg); }
            50% { clip: rect(20px, 9999px, 30px, 0); transform: skew(-0.2deg); }
            100% { clip: rect(10px, 9999px, 25px, 0); transform: skew(0.1deg); }
        }

        .log-entry {
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0.7;
            white-space: pre;
        }

         .back-link {
            color: #ffffff;
            text-decoration: none;
            margin-top: 40px;
            display: inline-block;
            font-size: 0.85rem;
            transition: 0.2s;
            width: fit-content;
        }

        .back-link:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch-wrapper">
            <div class="status-code">ERROR_CODE: WRONG_WAY</div>
        </div>
        
        <div class="log-entry">> INTRUSION_DETECTION_SYSTEM:.......... ACTIVE</div>
        <div class="log-entry">> TRACING_ORIGIN...................... DONE</div>
        <div class="log-entry">> LOGGING_REQUEST_METADATA............... SUCCESS</div>
        <div class="log-entry">> HONEYPOT_TRIGGERED:................. 172.16.1.195</div>
        <div class="log-entry">> ACCESS_DENIED_</div>
        
        <a href="index.html" class="back-link">RETURN_TO_SAFETY</a>
    </div>

</body>
</html>
