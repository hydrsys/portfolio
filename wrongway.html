<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>System Trace</title>
    <style>
        body { 
            background: #ffffff; 
            color: #000000; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 20px;
            height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-code {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .log-entry {
            font-size: 0.9rem;
        }

        a {
            color: #000;
            text-decoration: none;
            margin-top: 30px;
            display: inline-block;
            border: 1px solid #000;
            padding: 5px 10px;
        }

        a:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-code">ERROR_CODE: WRONG_WAY</div>
        <div class="log-entry">> INTRUSION_DETECTION_SYSTEM: ACTIVE</div>
        <div class="log-entry">> TRACING_ORIGIN... DONE</div>
        <div class="log-entry">> LOGGING_REQUEST_METADATA... SUCCESS</div>
        <div class="log-entry">> HONEYPOT_TRIGGERED: 172.16.1.195</div>
        
        <a href="index.html">RETURN_TO_SAFETY</a>
    </div>

</body>
</html>
